<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Reference Guide</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background-color: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background-color: #3b82f6;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn:hover {
      background-color: #2563eb;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .domain {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128218;</div>
    <h1>This page has moved</h1>
    <p class="subtitle">
      The Dev Reference Guide has a new home.<br>
      You will be redirected automatically.
    </p>
    <a class="btn" href="https://abrmeval-github-io.vercel.app/">Go to the new site</a>
    <p class="domain">https://abrmeval-github-io.vercel.app/</p>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = "https://abrmeval-github-io.vercel.app/";
    }, 3000);
  </script>
</body>
</html>
